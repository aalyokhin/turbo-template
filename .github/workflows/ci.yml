name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # Builds and pushes a Docker image on pushes to main.
  # Set the REGISTRY_URL variable and REGISTRY_USERNAME/REGISTRY_PASSWORD
  # secrets to enable; the job is skipped until REGISTRY_URL is defined.
  build-push:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && vars.REGISTRY_URL != ''
    env:
      IMAGE_NAME: turbo-template
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ vars.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ vars.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:cache,mode=max
